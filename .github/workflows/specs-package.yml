name: Package Specs

on:
  push:
    branches:
      - main
    paths:
      - 'asdm-core-assets/specs/**'
  pull_request:
    branches:
      - main
    paths:
      - 'asdm-core-assets/specs/**'
  workflow_dispatch:

jobs:
  package-specs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create zip files for each spec
        run: |
          SPECS_DIR="asdm-core-assets/specs"
          OUTPUT_DIR="$GITHUB_WORKSPACE/packaged-specs"
          
          mkdir -p "$OUTPUT_DIR"
          
          for dir in "$SPECS_DIR"/*/; do
            if [ -d "$dir" ]; then
              dirname=$(basename "$dir")
              echo "Packaging spec: $dirname"
              (cd "$SPECS_DIR" && zip -r "$OUTPUT_DIR/${dirname}.zip" "$dirname")
            fi
          done
          
          echo "Created zip files:"
          ls -la "$OUTPUT_DIR/"

      - name: Upload spec artifacts
        uses: actions/upload-artifact@v4
        with:
          name: specs-packages
          path: packaged-specs/*.zip
          retention-days: 30

      - name: Deploy to SIT01
        if: github.ref == 'refs/heads/main'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          set -e
      
          # 安装依赖（必须 sudo）
          sudo apt-get update
          sudo apt-get install -y openssh-client rsync sshpass
      
          # 防止端口异常
          PORT=${SSH_PORT:-22}
      
          ARTIFACTS_DIR="/data/artifacts"
      
          echo "Using SSH port: $PORT"
      
          # 创建目录
          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -p "$PORT" \
            "$SSH_USER@$SSH_HOST" \
            "mkdir -p $ARTIFACTS_DIR/specs"
      
          # 同步文件
          sshpass -p "$SSH_PASSWORD" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p $PORT" \
            packaged-specs/ \
            "$SSH_USER@$SSH_HOST:$ARTIFACTS_DIR/specs/"
      
          echo "Deployed specs to SIT01"

      - name: Deploy to DT01
        if: github.ref == 'refs/heads/main'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST_DT }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          set -e
      
          # 安装依赖（必须 sudo）
          sudo apt-get update
          sudo apt-get install -y openssh-client rsync sshpass
      
          # 防止端口异常
          PORT=${SSH_PORT:-22}
      
          ARTIFACTS_DIR="/data/artifacts"
      
          echo "Using SSH port: $PORT"
      
          # 创建目录
          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -p "$PORT" \
            "$SSH_USER@$SSH_HOST" \
            "mkdir -p $ARTIFACTS_DIR/specs"
      
          # 同步文件
          sshpass -p "$SSH_PASSWORD" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p $PORT" \
            packaged-specs/ \
            "$SSH_USER@$SSH_HOST:$ARTIFACTS_DIR/specs/"
      
          echo "Deployed specs to DT01"

      - name: Deploy to PROD
        if: github.ref == 'refs/heads/main'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST_PROD }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          set -e
      
          # 安装依赖（必须 sudo）
          sudo apt-get update
          sudo apt-get install -y openssh-client rsync sshpass
      
          # 防止端口异常
          PORT=${SSH_PORT:-22}
      
          ARTIFACTS_DIR="/data/artifacts"
      
          echo "Using SSH port: $PORT"
      
          # 创建目录
          sshpass -p "$SSH_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -p "$PORT" \
            "$SSH_USER@$SSH_HOST" \
            "mkdir -p $ARTIFACTS_DIR/specs"
      
          # 同步文件
          sshpass -p "$SSH_PASSWORD" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p $PORT" \
            packaged-specs/ \
            "$SSH_USER@$SSH_HOST:$ARTIFACTS_DIR/specs/"
      
          echo "Deployed specs to PROD"