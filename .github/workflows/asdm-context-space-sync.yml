# ASDM Context Space Sync — 公开仓库可匿名 clone；私有仓库在 workflow 仓库配置 Secret GIT_CLONE_TOKEN（PAT 等）。
# 将本文件复制到实际承载 workflow 的仓库（如 asdm-core-assets）的 .github/workflows/ 下使用。

name: ASDM Context Space Sync

on:
  workflow_dispatch:
    inputs:
      repo-url:
        description: 'Git repository HTTPS URL (public or private if secrets configured)'
        required: true
        default: ''
      branch:
        description: 'Branch name (fallback to master if main not found)'
        required: false
        default: 'main'
        type: string
      toolset-id:
        description: 'Toolset id (library_context_items.toolset_id)'
        required: true
        type: string
      toolset-command:
        description: 'Toolset slash command (e.g. /ctx-repo-scan-zh) or "asdm toolset run <id>"'
        required: true
        type: string
      install-toolsets-prompt:
        description: 'install-toolsets-prompt.md content (will be executed by CodeBuddy)'
        required: true
        type: string
      github-token:
        description: 'GitHub token for cross-repository access'
        required: false
        default: ''
        type: string

env:
  ACTIONS_STEP_DEBUG: true
  ACTIONS_RUNNER_DEBUG: true

jobs:
  analyze-repository:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Configure Git for cross-repository access
        if: inputs.github-token != ''
        run: |
          git config --global url."https://x-access-token:${{ inputs.github-token }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CodeBuddy
        run: |
          npm install -g @tencent-ai/codebuddy-code
          codebuddy --version

      - name: Build Log Parser
        run: |
          cd tools/codebuddy-log-parser
          npm install
          npm run build

      - name: Install ASDM CLI
        run: |
          npm install -g @leansoftx/asdm-bootstrapper-cli
          asdm --version
          asdm config --set-mock y

      - name: Clone target repository
        id: clone-repo
        env:
          REPO_URL: ${{ inputs.repo-url }}
          BRANCH: ${{ inputs.branch }}
          GIT_CLONE_TOKEN: ${{ secrets.GIT_CLONE_TOKEN }}
        run: |
          set -euo pipefail

          export CLONE_URL
          CLONE_URL=$(REPO_URL="$REPO_URL" GIT_CLONE_TOKEN="${GIT_CLONE_TOKEN:-}" \
            python3 << 'PY'
          import os
          from urllib.parse import urlparse, urlunparse, quote

          raw = os.environ.get("REPO_URL", "").strip()
          token = (os.environ.get("GIT_CLONE_TOKEN") or "").strip()

          if not raw:
              raise SystemExit("REPO_URL is empty")

          if "://" not in raw:
              raw = "https://" + raw

          p = urlparse(raw)
          if p.scheme not in ("http", "https"):
              raise SystemExit("Only http(s) repository URLs are supported")

          host = (p.hostname or "").lower()
          hostport = f"{p.hostname}:{p.port}" if p.port else (p.hostname or "")
          path = p.path.rstrip("/") or "/"

          if token:
              if "github.com" in host:
                  netloc = f"x-access-token:{quote(token, safe='')}@{hostport}"
              elif "gitlab" in host:
                  netloc = f"oauth2:{quote(token, safe='')}@{hostport}"
              else:
                  netloc = f"oauth2:{quote(token, safe='')}@{hostport}"
          else:
              netloc = p.netloc

          if not path.endswith(".git"):
              path = path + ".git"

          out = urlunparse((p.scheme, netloc, path, "", "", ""))
          print(out)
          PY
          )

          REPO_NAME=$(echo "$REPO_URL" | sed 's/.*\///' | sed 's/\.git$//')
          echo "REPO_NAME=$REPO_NAME" >> "$GITHUB_OUTPUT"

          echo "Cloning repository: $REPO_URL"
          echo "Requested branch: $BRANCH"
          if [ -n "${GIT_CLONE_TOKEN:-}" ]; then
            echo "Using authenticated clone (GIT_CLONE_TOKEN secret)."
          else
            echo "Using unauthenticated clone (public repos only)."
          fi

          try_clone() {
            local b="$1"
            rm -rf "$REPO_NAME"
            git clone --branch "$b" --single-branch "$CLONE_URL" "$REPO_NAME"
          }

          if try_clone "$BRANCH" 2>/dev/null; then
            echo "✓ Successfully cloned on branch: $BRANCH"
            echo "ACTUAL_BRANCH=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "Failed to clone on branch '$BRANCH', trying fallback branches..."
            if [ "$BRANCH" = "main" ]; then
              if try_clone "master" 2>/dev/null; then
                echo "✓ Successfully cloned on branch: master"
                echo "ACTUAL_BRANCH=master" >> "$GITHUB_OUTPUT"
              else
                echo "✗ Error: Failed to clone repository on both main and master branches"
                exit 1
              fi
            else
              if try_clone "main" 2>/dev/null; then
                echo "✓ Successfully cloned on branch: main"
                echo "ACTUAL_BRANCH=main" >> "$GITHUB_OUTPUT"
              elif try_clone "master" 2>/dev/null; then
                echo "✓ Successfully cloned on branch: master"
                echo "ACTUAL_BRANCH=master" >> "$GITHUB_OUTPUT"
              else
                echo "✗ Error: Failed to clone repository on any branch"
                exit 1
              fi
            fi
          fi

          echo ""
          echo "Repository cloned to: $REPO_NAME"
          cd "$REPO_NAME"
          echo "Current commit: $(git log -1 --oneline)"

      - name: Create asdm-context-space-result directory
        id: create-result-dir
        env:
          REPO_NAME: ${{ steps.clone-repo.outputs.REPO_NAME }}
        run: |
          cd "$REPO_NAME"
          RESULT_DIR="$(pwd)/asdm-context-space-result"
          mkdir -p "$RESULT_DIR"
          echo "RESULT_DIR=$RESULT_DIR" >> "$GITHUB_OUTPUT"
          echo "Created asdm-context-space-result directory at: $RESULT_DIR"

      # CODEBUDDY_BASE_URL：自建网关时必填，例如 https://your-api.internal:8443（与 CODEBUDDY_API_KEY 同属一套）
      # 未设置时默认请求 https://www.codebuddy.ai
      - name: Analyze repository with CodeBuddy
        env:
          CODEBUDDY_API_KEY: ${{ secrets.CODEBUDDY_API_KEY }}
          CODEBUDDY_BASE_URL: ${{ secrets.CODEBUDDY_BASE_URL }}
          CODEBUDDY_INTERNET_ENVIRONMENT: ${{ secrets.CODEBUDDY_INTERNET_ENVIRONMENT }}
          REPO_NAME: ${{ steps.clone-repo.outputs.REPO_NAME }}
          TOOLSET_ID: ${{ inputs.toolset-id }}
          TOOLSET_COMMAND: ${{ inputs.toolset-command }}
          INSTALL_TOOLSETS_PROMPT: ${{ inputs.install-toolsets-prompt }}
        run: |
          cd "$REPO_NAME"

          LOG_FILE="${{ github.workspace }}/analysis.log"
          INSTALL_LOG_FILE="${{ github.workspace }}/install-toolsets.log"
          PARSER="${{ github.workspace }}/tools/codebuddy-log-parser/dist/index.js"

          echo "=== asdm --version ==="
          asdm --version
          echo "=== asdm config --set-mock y ==="
          asdm config --set-mock y

          echo "=== asdm toolset install ${TOOLSET_ID} ==="
          asdm toolset install "$TOOLSET_ID"

          echo "=== Prepare install-toolsets-prompt.md ==="
          printf '%s' "$INSTALL_TOOLSETS_PROMPT" > "install-toolsets-prompt.md"

          echo "=== codebuddy run install-toolsets-prompt.md ==="
          set +e
          codebuddy -p "运行 install-toolsets-prompt.md" -y --output-format stream-json 2>&1 | tee "$INSTALL_LOG_FILE"
          CB_INSTALL=${PIPESTATUS[0]}
          set -e
          if [ "$CB_INSTALL" -ne 0 ]; then
            echo "CodeBuddy install prompt failed (exit=$CB_INSTALL)" >&2
            exit "$CB_INSTALL"
          fi

          TOOLSET_SLASH_CMD="$TOOLSET_COMMAND"
          # Normalize to slash command:
          # - "/ctx-xxx" => "/ctx-xxx"
          # - "asdm toolset run ctx-xxx" => "/ctx-xxx"
          if [[ "$TOOLSET_SLASH_CMD" != /* ]]; then
            if [[ "$TOOLSET_SLASH_CMD" == asdm\ toolset\ run\ * ]]; then
              TOOLSET_SLASH_CMD="/${TOOLSET_SLASH_CMD##*run }"
            else
              TOOLSET_SLASH_CMD="/$TOOLSET_SLASH_CMD"
            fi
          fi

          echo "=== codebuddy run toolset: ${TOOLSET_SLASH_CMD} ==="
          : > "$LOG_FILE"
          set +e
          codebuddy -p "$TOOLSET_SLASH_CMD" -y --output-format stream-json 2>&1 | tee "$LOG_FILE" | node "$PARSER" --stdin --stream -f human-chat --no-color
          CB=${PIPESTATUS[0]}
          set -e
          if [ "$CB" -eq 0 ]; then
            # Some toolsets (e.g. context-builder) write to `.asdm/contexts/index.md`.
            # Normalize to the required fixed output path `.codebuddy/contexts/index.md`.
            if [ ! -s ".codebuddy/contexts/index.md" ] && [ -s ".asdm/contexts/index.md" ]; then
              mkdir -p ".codebuddy/contexts"
              cp ".asdm/contexts/index.md" ".codebuddy/contexts/index.md"
            fi
            if [ ! -s ".codebuddy/contexts/index.md" ]; then
              echo "Missing or empty output: $(pwd)/.codebuddy/contexts/index.md" >&2
              CB=1
            fi
          fi
          exit "$CB"

      - name: Parse final log
        if: always()
        env:
          RESULT_DIR: ${{ steps.create-result-dir.outputs.RESULT_DIR }}
        run: |
          LOG_FILE="${{ github.workspace }}/analysis.log"
          PARSER="${{ github.workspace }}/tools/codebuddy-log-parser/dist/index.js"

          if [ -f "$LOG_FILE" ]; then
            echo ""
            echo "=== Final Parsed Log ==="
            cat "$LOG_FILE" | node "$PARSER" --stdin -f human-chat --no-color 2>/dev/null || echo "Log file exists but parser failed"

            cat "$LOG_FILE" | node "$PARSER" --stdin -f json > "$RESULT_DIR/analysis-log.json" 2>/dev/null || true
          fi

      - name: Generate context space metadata
        run: |
          REPO_NAME="${{ steps.clone-repo.outputs.REPO_NAME }}"
          ACTUAL_BRANCH="${{ steps.clone-repo.outputs.ACTUAL_BRANCH }}"
          RESULT_DIR="${{ steps.create-result-dir.outputs.RESULT_DIR }}"

          cat > "$RESULT_DIR/metadata.json" << EOF
          {
            "repository": {
              "url": "${{ inputs.repo-url }}",
              "name": "$REPO_NAME",
              "branch": "$ACTUAL_BRANCH",
              "requested_branch": "${{ inputs.branch }}"
            },
            "analysis": {
              "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
              "workflow_run_id": "${{ github.run_id }}",
              "result_directory": "$RESULT_DIR"
            }
          }
          EOF

          echo "Metadata generated:"
          cat "$RESULT_DIR/metadata.json"

          echo ""
          echo "Generated files in result directory:"
          ls -la "$RESULT_DIR/" || echo "No files generated yet"

      - name: Upload analysis logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-logs
          path: analysis.log
          retention-days: 7

      - name: Upload context space artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asdm-context-space-result
          path: ${{ steps.clone-repo.outputs.REPO_NAME }}/.codebuddy/contexts/index.md
          retention-days: 30

      - name: Summary
        if: always()
        env:
          REPO_NAME: ${{ steps.clone-repo.outputs.REPO_NAME }}
        run: |
          echo "======================================"
          echo "Context Space Sync Completed"
          echo "======================================"
          echo "Repository: ${{ inputs.repo-url }}"
          echo "Branch: ${{ steps.clone-repo.outputs.ACTUAL_BRANCH }}"
          echo "Result directory: ${{ steps.create-result-dir.outputs.RESULT_DIR }}"
          echo ""
          echo "Artifacts:"
          echo "  - asdm-context-space-result: Analysis results (30 days retention)"
          echo "  - analysis-logs: Execution logs (7 days retention)"
          echo ""
          echo "Generated files:"
          ls -la "$REPO_NAME/asdm-context-space-result/" 2>/dev/null || echo "No files in result directory"
          echo "======================================"
