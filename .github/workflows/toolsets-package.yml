name: Package Toolsets

on:
  push:
    branches:
      - main
    paths:
      - 'asdm-core-assets/toolsets/**'
  pull_request:
    branches:
      - main
    paths:
      - 'asdm-core-assets/toolsets/**'
  workflow_dispatch:

jobs:
  package-toolsets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create zip files for each toolset
        run: |
          TOOLSETS_DIR="asdm-core-assets/toolsets"
          OUTPUT_DIR="$GITHUB_WORKSPACE/packaged-toolsets"
          
          # Create a directory to store zip files
          mkdir -p "$OUTPUT_DIR"
          
          # Loop through each subdirectory in toolsets
          for dir in "$TOOLSETS_DIR"/*/; do
            if [ -d "$dir" ]; then
              # Get the directory name
              dirname=$(basename "$dir")
              echo "Packaging toolset: $dirname"
              
              # Create zip file
              (cd "$TOOLSETS_DIR" && zip -r "$OUTPUT_DIR/${dirname}.zip" "$dirname")
            fi
          done
          
          # List created zip files
          echo "Created zip files:"
          ls -la "$OUTPUT_DIR/"

      - name: Upload toolset artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toolsets-packages
          path: packaged-toolsets/*.zip
          retention-days: 30

      # Deploy to SIT01 environment
      - name: Deploy to SIT01
        if: github.ref == 'refs/heads/main'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          set -e

          sudo apt-get update
          sudo apt-get install -y openssh-client rsync sshpass
          
          # Remote paths
          ARTIFACTS_DIR="/data/artifacts"

          echo "Using SSH port: $PORT"
          
          # Create remote directory
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "mkdir -p $ARTIFACTS_DIR/toolsets"
            
          # Upload files
          sshpass -p "$SSH_PASSWORD" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p $SSH_PORT" \
            packaged-toolsets/ \
            $SSH_USER@$SSH_HOST:$ARTIFACTS_DIR/toolsets/
          
          echo "Deployed toolsets to SIT01 successfully"

      - name: Deploy to DT01
        if: github.ref == 'refs/heads/main'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST_DT }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          set -e

          sudo apt-get update
          sudo apt-get install -y openssh-client rsync sshpass
          
          # Remote paths
          ARTIFACTS_DIR="/data/artifacts"

          echo "Using SSH port: $PORT"
          
          # Create remote directory
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "mkdir -p $ARTIFACTS_DIR/toolsets"
            
          # Upload files
          sshpass -p "$SSH_PASSWORD" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p $SSH_PORT" \
            packaged-toolsets/ \
            $SSH_USER@$SSH_HOST:$ARTIFACTS_DIR/toolsets/
          
          echo "Deployed toolsets to DT01 successfully"

      - name: Deploy to PROD
        if: github.ref == 'refs/heads/main'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST_PROD }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          set -e

          sudo apt-get update
          sudo apt-get install -y openssh-client rsync sshpass
          
          # Remote paths
          ARTIFACTS_DIR="/data/artifacts"

          echo "Using SSH port: $PORT"
          
          # Create remote directory
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no -p $SSH_PORT $SSH_USER@$SSH_HOST "mkdir -p $ARTIFACTS_DIR/toolsets"
            
          # Upload files
          sshpass -p "$SSH_PASSWORD" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p $SSH_PORT" \
            packaged-toolsets/ \
            $SSH_USER@$SSH_HOST:$ARTIFACTS_DIR/toolsets/
          
          echo "Deployed toolsets to PROD successfully"